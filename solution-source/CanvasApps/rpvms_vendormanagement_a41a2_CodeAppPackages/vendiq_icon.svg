<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- RP-inspired palette: deep navy -> cyan -> teal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#062845"/>
      <stop offset="45%" stop-color="#0B385A"/>
      <stop offset="100%" stop-color="#003559"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A7E1"/>
      <stop offset="100%" stop-color="#008F8A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tileA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#D8ECF5" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB27A"/>
      <stop offset="100%" stop-color="#E5460F"/>
    </linearGradient>
    <linearGradient id="vLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B385A"/>
      <stop offset="100%" stop-color="#00A7E1"/>
    </linearGradient>
    <linearGradient id="vRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B385A"/>
      <stop offset="100%" stop-color="#008F8A"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00101F" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Ambient cyan/teal glow blobs -->
  <circle cx="120" cy="120" r="100" fill="#00A7E1" opacity="0.22" filter="url(#soft)"/>
  <circle cx="420" cy="400" r="120" fill="#008F8A" opacity="0.28" filter="url(#soft)"/>

  <!-- Top highlight -->
  <rect x="16" y="16" width="480" height="240" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Connection network (vendor graph) -->
  <g stroke="#00A7E1" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M256 256 L140 160"/>
    <path d="M256 256 L372 160"/>
    <path d="M256 256 L140 360"/>
    <path d="M256 256 L372 360"/>
    <path d="M140 160 L372 160"/>
    <path d="M140 360 L372 360"/>
  </g>

  <!-- Outer vendor nodes (tiles) -->
  <g filter="url(#drop)">
    <rect x="108" y="128" width="64" height="64" rx="14" fill="url(#tileA)"/>
    <rect x="340" y="128" width="64" height="64" rx="14" fill="url(#tileA)"/>
    <rect x="108" y="328" width="64" height="64" rx="14" fill="url(#tileA)"/>
    <rect x="340" y="328" width="64" height="64" rx="14" fill="url(#tileA)"/>
  </g>

  <!-- Node glyphs -->
  <g>
    <!-- Top-left: building -->
    <g transform="translate(120,140)">
      <rect x="4" y="8" width="40" height="32" rx="3" fill="#0B385A"/>
      <rect x="8" y="14" width="6" height="6" fill="#ffffff"/>
      <rect x="21" y="14" width="6" height="6" fill="#ffffff"/>
      <rect x="34" y="14" width="6" height="6" fill="#ffffff"/>
      <rect x="8" y="26" width="6" height="6" fill="#ffffff"/>
      <rect x="21" y="26" width="6" height="6" fill="#ffffff"/>
      <rect x="34" y="26" width="6" height="6" fill="#ffffff"/>
    </g>
    <!-- Top-right: package -->
    <g transform="translate(352,140)">
      <path d="M24 4 L44 14 L44 36 L24 46 L4 36 L4 14 Z" fill="#00A7E1"/>
      <path d="M24 4 L44 14 L24 24 L4 14 Z" fill="#0B385A"/>
      <path d="M24 24 L24 46 L44 36 L44 14 Z" fill="#003559" opacity="0.75"/>
    </g>
    <!-- Bottom-left: tag -->
    <g transform="translate(120,340)">
      <path d="M6 8 L26 8 L44 26 L26 44 L6 26 Z" fill="#008F8A"/>
      <circle cx="16" cy="18" r="4" fill="#ffffff"/>
    </g>
    <!-- Bottom-right: bar chart -->
    <g transform="translate(352,340)">
      <rect x="6" y="28" width="8" height="16" rx="2" fill="#0B385A"/>
      <rect x="20" y="18" width="8" height="26" rx="2" fill="#00A7E1"/>
      <rect x="34" y="8" width="8" height="36" rx="2" fill="#008F8A"/>
    </g>
  </g>

  <!-- Central AI hub -->
  <g filter="url(#drop)">
    <circle cx="256" cy="256" r="74" fill="#ffffff"/>
    <circle cx="256" cy="256" r="74" fill="url(#accent)" opacity="0.08"/>
  </g>
  <circle cx="256" cy="256" r="74" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <!-- V monogram inside hub -->
  <g transform="translate(256,256)">
    <path d="M-38 -32 L-12 34 L-2 34 L-28 -32 Z" fill="url(#vLeft)"/>
    <path d="M38 -32 L12 34 L2 34 L28 -32 Z" fill="url(#vRight)"/>
    <!-- IQ spark (RP orange accent) -->
    <circle cx="0" cy="-40" r="7" fill="url(#spark)"/>
  </g>

  <!-- Sparkle accents -->
  <g>
    <path d="M400 96 l6 14 14 6 -14 6 -6 14 -6 -14 -14 -6 14 -6 z" fill="#E5460F" opacity="0.9"/>
    <path d="M96 420 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" fill="#00A7E1" opacity="0.9"/>
    <path d="M432 256 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="none" stroke="#00A7E1" stroke-opacity="0.18" stroke-width="2"/>
</svg>
